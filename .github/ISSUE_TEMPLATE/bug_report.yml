name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, access tokens, or private experiment data.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what was expected?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest code sample or command that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: skyportalai version
      placeholder: Output of skyportalai --version
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: Output of python --version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
