name: Feature request
description: Propose a focused improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired API or behavior and alternatives considered.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
